<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AB MUSIC_ | Music Blog</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#000;
color:white;
text-align:center;
padding:30px;
}

nav{
background:#111;
padding:12px;
text-align:center;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:2fr 1fr;
gap:25px;
}

.post{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.post img{
width:100%;
border-radius:6px;
}

.sidebar{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.music iframe{
width:100%;
margin-bottom:15px;
}

.search{
margin-bottom:20px;
}

.search input{
width:100%;
padding:10px;
}

footer{
background:#000;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>

</head>

<body>

<header>

<h1>AB MUSIC_</h1>
<p>Music • Studio • Blog</p>

</header>

<nav>

<a href="#">Home</a>
<a href="#">Blog</a>
<a href="#">Music</a>
<a href="#">Gallery</a>

</nav>

<div class="container">

<div>

<div class="search">

<input type="text" id="search" placeholder="Search posts...">

</div>

<div id="posts"></div>

</div>

<div class="sidebar">

<h3>Artist</h3>

<img src="https://via.placeholder.com/300">

<p>
AB MUSIC_ is an independent music artist creating original sounds and connecting with listeners worldwide.
</p>

<h3>Stream Music</h3>

<div class="music">

<iframe height="152"
src="https://open.spotify.com/embed/track/000"></iframe>

<iframe height="252"
src="https://audiomack.com/embed/song"></iframe>

<iframe height="166"
src="https://w.soundcloud.com/player/?url=https://soundcloud.com"></iframe>

</div>

<h3>Visitors</h3>

<p id="counter"></p>

</div>

</div>

<footer>

© 2026 AB MUSIC_

</footer>

<script>

const blogPosts = [

{
title:"New Music Journey",
image:"https://via.placeholder.com/900x400",
content:"AB MUSIC_ is preparing powerful new music releases."
},

{
title:"Studio Update",
image:"https://via.placeholder.com/900x400",
content:"Behind the scenes creating the next sound movement."
},

{
title:"Global Vision",
image:"https://via.placeholder.com/900x400",
content:"The AB MUSIC_ movement connects listeners worldwide."
}

]

function displayPosts(posts){

const container=document.getElementById("posts")

container.innerHTML=""

posts.forEach(post=>{

container.innerHTML+=`

<div class="post">

<img src="${post.image}">

<h2>${post.title}</h2>

<p>${post.content}</p>

</div>

`

})

}

displayPosts(blogPosts)

document.getElementById("search").addEventListener("keyup",function(){

const value=this.value.toLowerCase()

const filtered=blogPosts.filter(p=>p.title.toLowerCase().includes(value))

displayPosts(filtered)

})

let count=localStorage.getItem("visits")

count++

localStorage.setItem("visits",count)

document.getElementById("counter").innerText="Visitors: "+count

</script>

</body>
</html>
